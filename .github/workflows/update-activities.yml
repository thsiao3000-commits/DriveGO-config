name: Update activities

on:
  # Daily at 03:00 Taipei (UTC+8) = 19:00 UTC the day before.
  # GitHub may delay cron runs by 5-30 minutes when load is high.
  schedule:
    - cron: '0 19 * * *'
  # Manual trigger from the Actions tab (useful for testing).
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-activities
  cancel-in-progress: false

jobs:
  fetch:
    name: Fetch and commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch TDX activities
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: python scripts/fetch_activities.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/activities.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          git commit -m "data: update activities $(date -u +%Y-%m-%d)"
          git push
